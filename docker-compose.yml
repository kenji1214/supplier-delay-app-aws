services:
  backend:
    build:
      context: ./backend
    environment:
      SQLITE_PATH: /app/data/comments.db
      USE_MOCK_DATA: "true"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - comments-data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  comments-data:
